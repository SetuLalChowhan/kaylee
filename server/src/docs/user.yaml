paths:
  /api/user/me:
    get:
      summary: Get authenticated user profile
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        200:
          description: User profile returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      firstName: { type: string }
                      lastName: { type: string }
                      displayName: { type: string, nullable: true }
                      shortBio: { type: string, nullable: true }
                      servicesOffered: { type: string, nullable: true }
                      brandLogos:
                        type: array
                        items: { type: string }
                        nullable: true
                      socialLinks:
                        type: object
                        nullable: true
                      email: { type: string }
                      avatar: { type: string, nullable: true }
                      isVerified: { type: boolean }
        401:
          description: Unauthorized — no token provided
        403:
          description: Forbidden — invalid or expired token

  /api/user/update:
    patch:
      summary: Update profile (firstName, lastName, servicesOffered, brandLogos) and/or avatar
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                servicesOffered: { type: string }
                avatar:
                  type: string
                  format: binary
                brandLogos:
                  type: array
                  items:
                    type: string
                    format: binary
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                servicesOffered: { type: string }
                avatar: { type: string }
                brandLogos:
                  type: array
                  items: { type: string }
      responses:
        200:
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      firstName: { type: string }
                      lastName: { type: string }
                      servicesOffered: { type: string, nullable: true }
                      brandLogos:
                        type: array
                        items: { type: string }
                        nullable: true
                      email: { type: string }
                      avatar: { type: string, nullable: true }
        401:
          description: Unauthorized — no token provided
        403:
          description: Forbidden — invalid or expired token

  /api/user/change-password:
    patch:
      summary: Change the authenticated user's password
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                newPassword: { type: string }
      responses:
        200:
          description: Password changed successfully
        400:
          description: Incorrect old password or missing fields
        401:
          description: Unauthorized — no token provided
        403:
          description: Forbidden — invalid or expired token

  /api/user/onboarding:
    put:
      summary: Complete user onboarding with profile details (displayName, shortBio, avatar, socialLinks)
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName: { type: string }
                shortBio: { type: string }
                avatar:
                  type: string
                  format: binary
                socialLinks:
                  type: object
                  properties:
                    instagram: { type: string }
                    website: { type: string }
                    youtube: { type: string }
                    other: { type: string }
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName: { type: string }
                shortBio: { type: string }
                avatar: { type: string }
                socialLinks:
                  type: object
                  properties:
                    instagram: { type: string }
                    website: { type: string }
                    youtube: { type: string }
                    other: { type: string }
        400:
          description: Validation failed
        401:
          description: Unauthorized — no token provided
        403:
          description: Forbidden — invalid or expired token
