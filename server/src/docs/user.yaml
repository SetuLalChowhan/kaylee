paths:
  /api/user/me:
    get:
      summary: Get authenticated user profile
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        200:
          description: User profile returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      email: { type: string }
                      avatar: { type: string, nullable: true }
                      isVerified: { type: boolean }
        401:
          description: Unauthorized — no token provided
        403:
          description: Forbidden — invalid or expired token

  /api/user/update:
    patch:
      summary: Update profile name and/or avatar
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                avatar:
                  type: string
                  format: binary
      responses:
        200:
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      email: { type: string }
                      avatar: { type: string, nullable: true }
        401:
          description: Unauthorized — no token provided
        403:
          description: Forbidden — invalid or expired token

  /api/user/change-password:
    patch:
      summary: Change the authenticated user's password
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                newPassword: { type: string }
      responses:
        200:
          description: Password changed successfully
        400:
          description: Incorrect old password or missing fields
        401:
          description: Unauthorized — no token provided
        403:
          description: Forbidden — invalid or expired token
